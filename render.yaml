services:
  # API Server
  - type: web
    name: pa-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: pnpm install --prod=false && rm -rf node_modules/.prisma node_modules/.pnpm/@prisma+client*/node_modules/.prisma packages/api/dist packages/shared/dist && pnpm --filter @pa/shared build && pnpm --filter @pa/api db:generate && pnpm --filter @pa/api db:push && pnpm --filter @pa/api build
    startCommand: pnpm exec playwright install chromium && pnpm --filter @pa/api start
    disk:
      name: blog-images
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /var/data/uploads/.playwright
      - key: DATABASE_URL
        fromDatabase:
          name: pa-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: API_PUBLIC_URL
        sync: false
      - key: BABBLO_DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: UNSUBSCRIBE_SECRET
        sync: false
    healthCheckPath: /api/v1/health

  # Web UI
  - type: web
    name: pa-web
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: pnpm install && pnpm --filter @pa/shared build && pnpm --filter @pa/web build
    startCommand: pnpm --filter @pa/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: pa-db
    databaseName: pa
    region: frankfurt
    plan: free
    postgresMajorVersion: 16
